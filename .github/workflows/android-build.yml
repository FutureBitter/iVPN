name: Build & Sign FUTURIX

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # این خط اجازه میده دستی هم بیلد بگیری

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    # تنظیم جاوا (مورد نیاز برای ساخت اندروید)
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # مرحله ۱: ساخت فایل خام (Release)
    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # مرحله ۲: امضا کردن فایل با استفاده از کلیدهای تو (Secrets)
    # اگر سکرت‌ها را ست نکرده باشی، این مرحله خطا می‌دهد
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    # مرحله ۳: آپلود فایل نهایی برای دانلود
    - name: Upload Signed APK
      uses: actions/upload-artifact@v3
      with:
        name: FUTURIX-VPN-Signed
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
