name: Build Unsigned FUTURIX

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4       # نسخه جدید
    
    - name: set up JDK 17
      uses: actions/setup-java@v4     # نسخه جدید
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # مرحله ساخت فایل خام (بدون امضا)
    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # آپلود فایل خام برای دانلود
    - name: Upload Unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: FUTURIX-Unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
