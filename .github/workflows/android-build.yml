name: Build iVPN

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download Core Library
      run: |
        mkdir -p V2rayNG/app/libs
        echo "Downloading libv2ray.aar..."
        wget -O V2rayNG/app/libs/libv2ray.aar https://github.com/2dust/AndroidLib/releases/download/v0.5.4/libv2ray.aar
        ls -R V2rayNG/app/libs

    - name: Grant execute permission for gradlew
      run: |
        cd V2rayNG
        chmod +x gradlew

    - name: Build with Gradle
      run: |
        cd V2rayNG
        ./gradlew assembleRelease

    - name: Upload Unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: iVPN-Unsigned
        path: V2rayNG/app/build/outputs/apk/release/*.apk

